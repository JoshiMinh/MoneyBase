name: moneybase
description: "Smart personal finance and expense tracker powered by AI."
publish_to: "none"

version: 2.1.0+1

environment:
  sdk: ">=3.9.2 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^4.1.0
  firebase_auth: ^6.0.2
  cloud_firestore: ^6.0.1
  google_sign_in: ^7.2.0
  shared_preferences: ^2.5.3
  flutter_dotenv: ^6.0.0
  flutter_markdown: ^0.7.7+1
  google_generative_ai: ^0.4.7
  speech_to_text: ^7.3.0
  csv: ^6.0.0
  http: ^1.2.2
  file_picker: ^10.3.3
  crypto: ^3.0.3
  intl: ^0.20.2
  fl_chart: ^1.1.1
  flutter_riverpod: ^3.0.3
  share_plus: ^12.0.0
  flutter_carousel_widget: ^3.1.0
  home_widget: ^0.8.0
  dev: ^1.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_slidable: ^4.0.3
  flutter_form_builder: ^10.2.0
  form_builder_validators: ^11.2.0
  lottie: ^3.3.2
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/icon.png
    - assets/images/google.png

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
    image_path: "icon.png"
    background_color: "transparent"
    theme_color: "#000000"
  image_path: "icon.png"
  adaptive_icon_background: "transparent"
  adaptive_icon_foreground: "icon.png"
  remove_alpha_ios: false
  min_sdk_android: 21